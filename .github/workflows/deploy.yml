name: Build and Deploy Flutter Web

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'build/**'
      - 'web/**'
      - 'index.html'

jobs:
  build-and-commit:
    permissions:
      contents: write
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: main

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.7.12'
          channel: 'stable'
          architecture: x64

      - name: Initialize Web Wrapper
        run: |
          flutter config --enable-web > init_log.txt 2>&1 || true
          flutter create --org com.gym.app --project-name flutter_app . >> init_log.txt 2>&1 || true

      - name: Install Dependencies
        run: flutter pub get > pub_log.txt 2>&1 || true

      - name: Build Web App
        run: |
          flutter build web --release > build_log.txt 2>&1 || true
          cat init_log.txt pub_log.txt build_log.txt > complete_error_log.txt

      - name: Commit Built Files
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          git add build/web web/ index.html complete_error_log.txt || true
          git commit -m "Auto-build Flutter web [skip ci]" || true
          git push origin main || true
