name: Build and Deploy Flutter Web

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'build/**'
      - 'web/**'
      - 'index.html'

jobs:
  build-and-commit:
    permissions:
      contents: write
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.7.12'
          channel: 'stable'
          architecture: x64

      - name: Initialize Web Wrapper
        run: |
          flutter config --enable-web > init_log.txt 2>&1 || true
          flutter create --org com.gym.app --project-name flutter_app . >> init_log.txt 2>&1 || true

      - name: Install Dependencies
        run: flutter pub get > pub_log.txt 2>&1 || true

      - name: Build Web App
        run: |
          flutter build web --release > build_log.txt 2>&1 || true
          cat init_log.txt pub_log.txt build_log.txt > complete_error_log.txt

      - name: Commit Built Files
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Auto-build Flutter web [skip ci]"
          file_pattern: "build/web/ web/ index.html complete_error_log.txt"
          skip_dirty_check: false
          # Pushes the compiled frontend back into the main branch so Render can serve it
